name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Install all workspace packages
        run: uv sync --all-packages --extra dev

      - name: Run tests
        run: uv run pytest --tb=short -q

      - name: Check import boundaries (contracts must not import internals)
        run: |
          uv run python - <<'EOF'
          import ast
          import sys
          from pathlib import Path

          # Packages that contracts must never import
          forbidden_prefixes = [
              "core", "storage_sqlite", "graph_index", "memory",
              "runtime", "ranking", "workspace", "benchmark",
              "language_python", "language_java", "language_dotnet",
              "language_yaml", "adapters_claude", "adapters_copilot", "adapters_codex",
          ]

          contracts_src = Path("packages/contracts/src")
          violations = []

          for py_file in contracts_src.rglob("*.py"):
              tree = ast.parse(py_file.read_text(encoding="utf-8"))
              for node in ast.walk(tree):
                  if isinstance(node, ast.Import):
                      for alias in node.names:
                          for prefix in forbidden_prefixes:
                              if alias.name.startswith(prefix):
                                  violations.append(f"{py_file}: imports '{alias.name}'")
                  elif isinstance(node, ast.ImportFrom):
                      module = node.module or ""
                      for prefix in forbidden_prefixes:
                          if module.startswith(prefix):
                              violations.append(f"{py_file}: from '{module}' import ...")

          if violations:
              for v in violations:
                  print(f"BOUNDARY VIOLATION: {v}", file=sys.stderr)
              sys.exit(1)

          print("Import boundary check passed.")
          EOF
