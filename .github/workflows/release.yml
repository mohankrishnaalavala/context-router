name: Release

on:
  # Trigger automatically when a version tag is pushed
  push:
    tags:
      - "v*"

  # Trigger manually from the GitHub Actions UI (Actions → Release → Run workflow)
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 0.3.0 — without the v prefix)"
        required: true
        type: string
      prerelease:
        description: "Mark as pre-release?"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      dry_run:
        description: "Dry run — build + test only, skip PyPI publish and GitHub release"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

jobs:
  # ── 1. Tests ──────────────────────────────────────────────────────────────
  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --all-packages --extra dev

      - name: Run tests
        run: uv run pytest --tb=short -q

  # ── 2. Build ──────────────────────────────────────────────────────────────
  build:
    name: Build wheel
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --all-packages --extra dev

      - name: Build context-router-cli wheel
        run: |
          # Wheel only — bundles all workspace-internal sub-packages via
          # hatchling force-include directives in apps/cli/pyproject.toml.
          mkdir -p dist
          uv build --package context-router-cli --out-dir dist/ --wheel
          echo "Artifacts:"
          ls -lh dist/

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7

  # ── 3. Tag (manual dispatch only) ─────────────────────────────────────────
  tag:
    name: Create git tag
    needs: build
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' &&
      github.event.inputs.dry_run != 'true'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create and push tag v${{ inputs.version }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          TAG="v${{ inputs.version }}"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists — skipping tag creation"
          else
            git tag -a "$TAG" -m "Release $TAG"
            git push origin "$TAG"
            echo "Created and pushed tag $TAG"
          fi

  # ── 4. Publish to PyPI ────────────────────────────────────────────────────
  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.dry_run != 'true' }}
    environment:
      name: pypi
      url: https://pypi.org/p/context-router-cli
    permissions:
      id-token: write  # Required for OIDC trusted publishing (no token needed)

    steps:
      - name: Download wheel artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI (Trusted Publishing)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          skip-existing: true

  # ── 5. GitHub Release ─────────────────────────────────────────────────────
  github-release:
    name: GitHub Release
    needs: [publish, tag]
    runs-on: ubuntu-latest
    if: |
      always() &&
      needs.publish.result != 'failure' &&
      (needs.tag.result == 'success' || needs.tag.result == 'skipped') &&
      github.event.inputs.dry_run != 'true'
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Resolve tag and version
        id: meta
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=v${{ inputs.version }}"     >> $GITHUB_OUTPUT
            echo "version=${{ inputs.version }}"  >> $GITHUB_OUTPUT
          else
            echo "tag=${{ github.ref_name }}"                   >> $GITHUB_OUTPUT
            echo "version=${GITHUB_REF_NAME#v}"                 >> $GITHUB_OUTPUT
          fi

      - name: Extract changelog section for ${{ steps.meta.outputs.version }}
        id: changelog
        run: |
          VERSION="${{ steps.meta.outputs.version }}"
          NOTES=$(awk "/^## \[$VERSION\]/{flag=1; next} /^## \[/{flag=0} flag" CHANGELOG.md)
          echo "notes<<EOF" >> $GITHUB_OUTPUT
          echo "$NOTES"     >> $GITHUB_OUTPUT
          echo "EOF"        >> $GITHUB_OUTPUT

      - name: Download wheel artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name:   ${{ steps.meta.outputs.tag }}
          name:       "${{ steps.meta.outputs.tag }}"
          body:       ${{ steps.changelog.outputs.notes }}
          draft:      false
          prerelease: ${{ inputs.prerelease == 'true' }}
          files:      dist/*.whl

  # ── 6. Homebrew tap bump ──────────────────────────────────────────────────
  # Opens the tap repo, rewrites Formula/context-router.rb with the new
  # version + sha256 of the GitHub release tarball, and pushes. Runs after
  # publish + github-release so the tarball is definitely resolvable.
  #
  # Setup (one-time, per-repo): create a fine-grained PAT scoped to the tap
  # repo with `contents: write`, store it as the `HOMEBREW_TAP_TOKEN` secret
  # on this repo. See docs/release/homebrew-setup.md.
  homebrew-publish:
    name: Publish Homebrew formula
    needs: [publish, github-release]
    runs-on: ubuntu-latest
    if: |
      always() &&
      needs.publish.result == 'success' &&
      needs.github-release.result == 'success' &&
      github.event.inputs.dry_run != 'true'
    permissions:
      contents: read
    env:
      TAP_REPO: mohankrishnaalavala/homebrew-context-router
      FORMULA_PATH: Formula/context-router.rb
    steps:
      - name: Check out context-router (for template + renderer)
        uses: actions/checkout@v4
        with:
          path: context-router

      - name: Verify HOMEBREW_TAP_TOKEN secret is present
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          if [ -z "${HOMEBREW_TAP_TOKEN:-}" ]; then
            echo "::error title=HOMEBREW_TAP_TOKEN missing::The HOMEBREW_TAP_TOKEN secret is not set on this repository." >&2
            echo "" >&2
            echo "The homebrew-publish job cannot update the tap without a PAT." >&2
            echo "Follow docs/release/homebrew-setup.md to create a fine-grained PAT" >&2
            echo "scoped to ${TAP_REPO} with contents:write, then add it as a repo" >&2
            echo "secret named HOMEBREW_TAP_TOKEN." >&2
            exit 1
          fi
          echo "HOMEBREW_TAP_TOKEN is set (length=${#HOMEBREW_TAP_TOKEN})"

      - name: Resolve version (tag or dispatch input)
        id: meta
        env:
          DISPATCH_VERSION: ${{ inputs.version }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          if [ "${EVENT_NAME}" = "workflow_dispatch" ]; then
            VERSION="${DISPATCH_VERSION}"
          else
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          if [ -z "${VERSION}" ]; then
            echo "::error::could not resolve a version string" >&2
            exit 1
          fi
          # Sanity: accept only X.Y.Z(-suffix) — blocks shell-metachar injection.
          if ! printf '%s' "${VERSION}" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+([.-][A-Za-z0-9.]+)?$'; then
            echo "::error::version string failed validation: ${VERSION}" >&2
            exit 1
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Resolved VERSION=${VERSION}"

      - name: Download tarball and compute sha256
        id: sha
        env:
          VERSION: ${{ steps.meta.outputs.version }}
        run: |
          URL="https://github.com/${GITHUB_REPOSITORY}/archive/refs/tags/v${VERSION}.tar.gz"
          echo "Downloading ${URL}"
          # Retry a few times: the GitHub-release tarball takes a moment to
          # become retrievable after the release is published.
          for attempt in 1 2 3 4 5; do
            if curl -fsSL -o tarball.tgz "${URL}"; then
              break
            fi
            echo "attempt ${attempt} failed, sleeping 10s"
            sleep 10
          done
          if [ ! -s tarball.tgz ]; then
            echo "::error::failed to download ${URL}" >&2
            exit 1
          fi
          SHA="$(sha256sum tarball.tgz | awk '{print $1}')"
          echo "sha256=${SHA}" >> "$GITHUB_OUTPUT"
          echo "sha256=${SHA}"

      - name: Check out tap repo
        uses: actions/checkout@v4
        with:
          repository: ${{ env.TAP_REPO }}
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: tap

      - name: Render formula from template
        env:
          VERSION: ${{ steps.meta.outputs.version }}
          SHA256:  ${{ steps.sha.outputs.sha256 }}
        run: |
          mkdir -p "tap/$(dirname "${FORMULA_PATH}")"
          python3 context-router/scripts/render_homebrew_formula.py \
            --template context-router/docs/homebrew-formula.rb \
            --version "${VERSION}" \
            --sha256  "${SHA256}" \
            > "tap/${FORMULA_PATH}"
          echo "--- rendered formula (first 25 lines) ---"
          head -25 "tap/${FORMULA_PATH}"
          # Fail fast if any placeholder survived.
          if grep -q "{{" "tap/${FORMULA_PATH}"; then
            echo "::error::rendered formula still contains {{...}} placeholders" >&2
            grep -n "{{" "tap/${FORMULA_PATH}" >&2
            exit 1
          fi

      - name: Commit and push to tap
        working-directory: tap
        env:
          VERSION: ${{ steps.meta.outputs.version }}
          SHA256:  ${{ steps.sha.outputs.sha256 }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "${FORMULA_PATH}"
          if git diff --cached --quiet; then
            echo "No changes to commit — formula already matches v${VERSION}."
            exit 0
          fi
          git commit -m "context-router ${VERSION}" \
                     -m "Auto-bumped by context-router release workflow." \
                     -m "Tarball: https://github.com/${GITHUB_REPOSITORY}/archive/refs/tags/v${VERSION}.tar.gz" \
                     -m "sha256:  ${SHA256}"
          git push origin HEAD:main
