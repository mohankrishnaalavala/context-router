name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --all-packages --extra dev

      - name: Run tests
        run: uv run pytest --tb=short -q

  publish:
    name: Publish to PyPI
    needs: test
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/context-router-cli
    permissions:
      id-token: write  # Required for trusted publishing (no token needed)

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --all-packages --extra dev

      - name: Build all packages
        run: |
          mkdir -p dist
          for pkg in \
            context-router-cli \
            context-router-contracts \
            context-router-core \
            context-router-storage-sqlite \
            context-router-graph-index \
            context-router-ranking \
            context-router-memory \
            context-router-runtime \
            context-router-workspace \
            context-router-benchmark \
            context-router-language-python \
            context-router-language-typescript \
            context-router-language-yaml \
            context-router-adapters-claude \
            context-router-adapters-copilot \
            context-router-adapters-codex; do
            echo "Building $pkg..."
            uv build --package "$pkg" --out-dir dist/
          done
          echo "Built $(ls dist/ | wc -l | tr -d ' ') artifacts"

      - name: Publish to PyPI (Trusted Publishing)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          skip-existing: true

  github-release:
    name: GitHub Release
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Extract changelog section
        id: changelog
        run: |
          # Extract the section matching the tag version
          VERSION="${GITHUB_REF_NAME#v}"
          NOTES=$(awk "/^## \[$VERSION\]/{flag=1; next} /^## \[/{flag=0} flag" CHANGELOG.md)
          echo "notes<<EOF" >> $GITHUB_OUTPUT
          echo "$NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "v${{ github.ref_name }}"
          body: ${{ steps.changelog.outputs.notes }}
          draft: false
          prerelease: false
