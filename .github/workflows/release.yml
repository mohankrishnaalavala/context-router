name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --all-packages --extra dev

      - name: Run tests
        run: uv run pytest --tb=short -q

  publish:
    name: Publish to PyPI
    needs: test
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/context-router
    permissions:
      id-token: write  # Required for trusted publishing (no token needed)

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --all-packages --extra dev

      - name: Build all packages
        run: |
          # Build each distributable package into dist/
          mkdir -p dist
          for pkg in \
            apps/cli \
            packages/contracts \
            packages/core \
            packages/storage-sqlite \
            packages/graph-index \
            packages/ranking \
            packages/memory \
            packages/runtime \
            packages/workspace \
            packages/benchmark \
            packages/language-python \
            packages/language-typescript \
            packages/language-yaml \
            packages/adapters-claude \
            packages/adapters-copilot \
            packages/adapters-codex; do
            echo "Building $pkg..."
            uv build --package $(grep '^name' $pkg/pyproject.toml | head -1 | cut -d'"' -f2) --out-dir dist/
          done

      - name: Publish to PyPI (Trusted Publishing)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          skip-existing: true

  github-release:
    name: GitHub Release
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Extract changelog section
        id: changelog
        run: |
          # Extract the section matching the tag version
          VERSION="${GITHUB_REF_NAME#v}"
          NOTES=$(awk "/^## \[$VERSION\]/{flag=1; next} /^## \[/{flag=0} flag" CHANGELOG.md)
          echo "notes<<EOF" >> $GITHUB_OUTPUT
          echo "$NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "v${{ github.ref_name }}"
          body: ${{ steps.changelog.outputs.notes }}
          draft: false
          prerelease: false
