[project]
name = "context-router-cli"
version = "0.1.0"
requires-python = ">=3.12"
description = "CLI entrypoint for context-router"
dependencies = [
    "typer>=0.12",
    "context-router-contracts",
    "context-router-core",
    "context-router-graph-index",
    "context-router-storage-sqlite",
]

[project.scripts]
context-router = "cli.main:app"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/cli"]
