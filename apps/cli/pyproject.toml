[project]
name = "context-router"
version = "0.2.0"
requires-python = ">=3.12"
description = "Local-first CLI and MCP server for AI coding context — minimum useful context, maximum agent performance"
readme = "README.md"
license = { text = "MIT" }
keywords = ["ai", "llm", "context", "mcp", "code-analysis", "developer-tools"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3.12",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
]
dependencies = [
    "typer>=0.12",
    "context-router-contracts",
    "context-router-core",
    "context-router-graph-index",
    "context-router-storage-sqlite",
    "context-router-ranking",
    "context-router-memory",
    "context-router-runtime",
    "context-router-workspace",
    "context-router-benchmark",
    "context-router-language-python",
    "context-router-language-yaml",
    "context-router-language-typescript",
    "context-router-adapters-claude",
    "context-router-adapters-copilot",
    "context-router-adapters-codex",
]

[project.urls]
Homepage = "https://github.com/mohankrishnaalavala/context-router"
"Bug Tracker" = "https://github.com/mohankrishnaalavala/context-router/issues"
Changelog = "https://github.com/mohankrishnaalavala/context-router/blob/main/CHANGELOG.md"

[project.optional-dependencies]
semantic = ["sentence-transformers>=2.2"]

[project.scripts]
context-router = "cli.main:app"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/cli"]
