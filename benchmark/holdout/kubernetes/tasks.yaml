# (`.handover/work/v4.4.4-plan.md`) refers to "the 3 k8s SHAs from prior
# session" — those numbers were not committed before the prior session
# was interrupted. Before publishing benchmark numbers, paste the 3 real
# SHAs + ground-truth files here. Until that happens, the runner skips
# tasks with `sha: TODO_…` (see PRECONDITION below).
#
# PRECONDITION: every task with a `sha: TODO_…` value must be filled in
# before running this fixture. The runner will fail fast on unresolved
