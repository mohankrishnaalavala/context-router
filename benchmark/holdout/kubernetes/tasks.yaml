# Holdout fixtures — kubernetes/kubernetes (197K symbols, polyglot).
# NEVER tune the ranker against these tasks.
# Clone: git clone https://github.com/kubernetes/kubernetes.git
#
# Three tasks chosen to exercise:
#   - the >10K-symbol cap (no diff anchor case, query-only anchor)
#   - cross-package retrieval (review with --pre-fix anchor)
#   - source-prior multiplier (review at the fix SHA — easy config)
#
# Run all three anchors per task (single SHA list, three sweeps):
#   bash benchmark/run-holdout.sh --repo kubernetes=/path/to/k8s --anchor fix-sha
#   bash benchmark/run-holdout.sh --repo kubernetes=/path/to/k8s --anchor parent-sha-with-diff
#   bash benchmark/run-holdout.sh --repo kubernetes=/path/to/k8s --anchor query-only
#
