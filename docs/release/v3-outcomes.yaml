    severity: P3
    effort: S
    title: "Java + C# enums indexed with kind=enum"
    outcome: "After indexing a repo with enums, kind='enum' rows exist"
    threshold: "spring-petclinic: count >= 1; eShopOnWeb: count >= 1"
    negative_case: "non-enum types unaffected (kind counts for class/interface unchanged pre/post)"
    verify:
      cmd: "scripts/smoke-v3.sh check enum-symbols-extracted"
      expected_stdout_contains: "PASS enum-symbols-extracted"

  - id: review-mode-risk-score
    severity: P3
    effort: S
    title: "pack --mode review surfaces a risk score per changed file"
    outcome: "review mode output column `risk` populated for every item touched by the current diff"
    threshold: "values are one of {low, medium, high}; high = file in top-10% by change frequency × complexity"
    negative_case: "no diff → all items show risk=none"
    verify:
      cmd: "uv run context-router pack --mode review --project-root . --json | jq '.items | map(.risk) | unique | length > 1'"
      expected_stdout_contains: "true"

  - id: audit-untested-hotspots
    severity: P3
    effort: M
    title: "audit --untested-hotspots ranks high-churn, low-coverage files"
    outcome: "CLI command prints a ranked list of files in top-10% churn with zero TESTED_BY edges"
    threshold: "on this repo, output contains at least one file + reason line"
    negative_case: "--project-root without coverage data → clear 'no coverage data' warning, exit 0"
    verify:
      cmd: "uv run context-router audit --untested-hotspots --project-root . | head -5"
      expected_stdout_contains: "untested"

  - id: flow-level-debug
    severity: P3
    effort: L
    title: "Debug mode returns flow-level context (list_flows / get_affected_flows)"
    outcome: "`get_debug_pack` for a stack trace returns items grouped by flow (entry → leaf)"
    threshold: "response.items[*].flow is non-null for at least the top 3 items"
    negative_case: "no flows detected → fall back to today's behavior with a note in `explain.why`"
    verify:
      cmd: "scripts/smoke-v3.sh check flow-level-debug"
      expected_stdout_contains: "PASS flow-level-debug"

  - id: cross-community-coupling
    severity: P3
    effort: S
    title: "Workspace pack warns on cross-community coupling"
    outcome: "multi-repo pack emits a warning when ≥N edges cross community boundaries unexpectedly"
    threshold: "threshold configurable; default fires on the 3-repo fixture workspace"
    negative_case: "single-repo pack does not emit this warning"
    verify:
      cmd: "scripts/smoke-v3.sh check cross-community-coupling"
      expected_stdout_contains: "PASS cross-community-coupling"

  - id: handover-wiki
    severity: P3
    effort: L
    title: "Handover mode can emit a wiki-style summary"
    outcome: "`context-router pack --mode handover --wiki` writes a markdown wiki of the top N subsystems"
    threshold: "generated wiki has ≥3 sections, each with a file-list + one-paragraph summary"
    negative_case: "--wiki flag without --mode handover prints a usage error"
    verify:
      cmd: "scripts/smoke-v3.sh check handover-wiki"
      expected_stdout_contains: "PASS handover-wiki"

