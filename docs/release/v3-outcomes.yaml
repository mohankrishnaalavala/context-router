    effort: XS
    title: "Review mode warns when invoked diff-less with a free-text query"
    outcome: "`pack --mode review --query '<free text>'` with no staged/unstaged diff prints a stderr warning: 'review mode expects a diff; for query-only input, try --mode debug'"
