    outcome: "_apply_hub_bridge_boost does not open new sqlite3.Connection when called from Orchestrator.build_pack"
    threshold: "at the boost call site, no sqlite3.connect() invocation when `db_connection` is available"
    negative_case: "ranker used standalone (no db_connection) still works via the fallback path"
    verify:
      cmd: "scripts/smoke-v3.sh check hub-bridge-sqlite-reuse"
      expected_stdout_contains: "PASS hub-bridge-sqlite-reuse"

  # ──────────────────── v3.2 Wave 1 (added 2026-04-19) ────────────────────

  - id: function-level-reason
    severity: P0
    effort: M
    title: "Pack items surface symbol name + line range in `reason` (not generic category labels)"
    outcome: "For any ContextItem backed by a symbol, `reason` includes the symbol's name and source line range (e.g. 'Modified `OAuth2PasswordRequestForm.__init__` lines 59-159')"
    threshold: "on fastapi@fa3588c, ≥80% of items with a non-null symbol_id have a `reason` containing both a symbol identifier and a `lines N-M` substring"
