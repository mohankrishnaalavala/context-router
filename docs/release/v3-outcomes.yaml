    negative_case: "missing embeddings → `pack --with-semantic` falls back to lexical with a stderr warning"
    verify:
      cmd: "scripts/smoke-v3.sh check proactive-embedding-cache"
      expected_stdout_contains: "PASS proactive-embedding-cache"

