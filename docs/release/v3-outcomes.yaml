      cmd: "scripts/smoke-v3.sh check call-chain-symbols-mcp"
      expected_stdout_contains: "PASS call-chain-symbols-mcp"

  - id: mcp-mimetype-content
    severity: P2
    effort: S
    title: "MCP tools/call content blocks include mimeType"
    outcome: "Every text content block in a tools/call response has mimeType set"
