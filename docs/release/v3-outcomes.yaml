# Feature outcome registry — v3.0.0
#
# Single source of truth for every v3 feature's user-visible outcome plus the
# exact command that proves it works. `scripts/smoke-v3.sh` reads this file
# and treats any missing / failing `verify.cmd` as a release blocker.
#
# Rules (enforced by the ship-check skill):
#   - Every item in internal_docs/production-readiness-review-v2.md's priority
#     queue must have a matching entry here before v3.0.0 tags.
#   - Each entry must have all four DoD fields filled (outcome, threshold,
#     negative_case, verify).
#   - `verify.cmd` MUST be runnable against one of the fixture repos in
#     project_context/ (bulletproof-react, eShopOnWeb, spring-petclinic) or
#     against this repo itself.
#   - `expected_stdout_contains` MUST be a specific substring — not "Success",
#     not "OK". If you can't name a specific string, the outcome isn't
#     well-defined.
#
# Severities mirror the v2 review:
#   P0 = release blocker. P1 = hotfix. P2 = v3 polish. P3 = nice-to-have.

version: "3.0.0"

fixtures:
  bulletproof_react: "${PROJECT_CONTEXT_ROOT}/bulletproof-react"
  eshop: "${PROJECT_CONTEXT_ROOT}/eShopOnWeb"
  petclinic: "${PROJECT_CONTEXT_ROOT}/spring-petclinic"

outcomes:

  # ──────────────────── P0 — blockers ────────────────────

  - id: cli-version-flag
    severity: P0
    effort: S
    title: "context-router --version prints the installed version"
    outcome: "`context-router --version` prints a semver string and exits 0"
    threshold: "stdout matches ^context-router \\d+\\.\\d+\\.\\d+"
    negative_case: "unknown flag `--versoin` exits non-zero with typer's usage error"
    verify:
      cmd: "uv run context-router --version"
      expected_stdout_contains: "context-router 3."

  - id: pack-dedup-at-orchestrator
    severity: P1
    effort: S
    title: "Pack dedup happens in build_pack, not only in CLI render"
    outcome: "MCP get_context_pack, explain last-pack, and pack --json all return the same deduped pack that the CLI table shows"
    threshold: "pack_from_mcp == pack_from_cli_json — item list has no duplicate (title, path_or_ref) pairs regardless of consumer"
    negative_case: "dedup count surfaced on ContextPack.metadata for consumers that want to display it"
    verify:
      cmd: "scripts/smoke-v3.sh check pack-dedup-at-orchestrator"
      expected_stdout_contains: "PASS pack-dedup-at-orchestrator"

  - id: pack-table-dedup
    severity: P0
    effort: S
    title: "Pack CLI table shows each symbol at most once"
    outcome: "Running `pack` never prints the same (title, path) row twice"
    threshold: "Pagination row appears exactly once on bulletproof-react query 'add pagination'"
    negative_case: "dedup is suppressed COUNT is surfaced via 'N duplicate(s) hidden' line"
    # verify.cmd uses an anchored regex so that 'Pagination (' only matches
    # rows starting with exactly "Pagination (" — not "TablePagination (".
    verify:
      cmd: "uv run context-router pack --mode implement --query 'add pagination' --project-root ${bulletproof_react} | grep -cE '^Pagination \\('"
      expected_stdout_contains: "1"

  - id: interface-kind-label
    severity: P0
    effort: S
    title: "Java interfaces and C# records indexed with correct kind"
    outcome: "After indexing eShopOnWeb, SQL query on symbols returns kind=interface for at least one known interface"
    threshold: "count of kind='interface' > 0 after indexing eShopOnWeb"
    negative_case: "structs remain kind='struct'; classes remain kind='class'"
    verify:
      cmd: "uv run context-router index --project-root ${eshop} && sqlite3 ${eshop}/.context-router/db.sqlite \"SELECT count(*) FROM symbols WHERE kind='interface'\""
      expected_stdout_contains: "1"

  - id: benchmark-keyword-baseline-honest
    severity: P0
    effort: S
    title: "Benchmark keyword-baseline vs_keyword column shows honest negatives"
    outcome: "`benchmark run --json --runs 10` never clamps vs_keyword to 0; when keyword baseline pack is smaller than router, the field is negative"
    threshold: "on this repo, at least one task has vs_keyword < 0 in --runs 10 output"
    negative_case: "on fixtures where router is strictly tighter than keyword, vs_keyword is positive across all tasks (regression guard)"
    verify:
      cmd: "scripts/smoke-v3.sh check benchmark-keyword-baseline-honest"
      expected_stdout_contains: "PASS benchmark-keyword-baseline-honest"

  # ──────────────────── P1 — hotfix candidates rolled into v3 ────────────────────

  - id: pack-cache-persists-cli
    severity: P1
    effort: S
    title: "Repeat pack invocations from CLI are measurably faster"
    outcome: "Second `pack` run for the same query completes in <50% of the first run's wall time"
    threshold: "second run wall < 0.5 * first run wall, measured via /usr/bin/time"
    negative_case: "after `context-router index` (index bump), cache is invalidated — third run is as slow as the first"
    verify:
      cmd: "scripts/smoke-v3.sh check pack-cache-persists-cli"
      expected_stdout_contains: "PASS pack-cache-persists-cli"

  - id: with-semantic-warns-outside-implement
    severity: P1
    effort: S
    title: "--with-semantic outside implement mode emits a warning"
    outcome: "SUPERSEDED in Phase 2 by `semantic-default-with-progress` — the warning was a phase-1 bridge; `--with-semantic` now applies in every mode so no warning is needed."
    threshold: "N/A (superseded)"
    negative_case: "N/A (superseded)"
    status: "superseded"
    # Verify is kept for historical record; smoke will FAIL this id intentionally
    # and that is expected. The behavior documented by `semantic-default-with-progress`
    # is the replacement contract.
    verify:
      cmd: "echo 'SUPERSEDED by semantic-default-with-progress (Phase 2)'"
      expected_stdout_contains: "SUPERSEDED by semantic-default-with-progress"

  - id: contracts-boost-single-repo
    severity: P1
    effort: M
    title: "Contracts consume/produce boost works on single-repo packs"
    outcome: "In a single-repo fixture with an OpenAPI spec, items that match a `consumes` endpoint score higher than unrelated items"
    threshold: "item whose file contains `fetch('/api/orders/')` ranks in top 5 for query 'create order' when openapi.yaml defines POST /orders"
    negative_case: "no OpenAPI spec present → ranking unchanged from baseline"
    verify:
      cmd: "scripts/smoke-v3.sh check contracts-boost-single-repo"
      expected_stdout_contains: "PASS contracts-boost-single-repo"

  - id: contracts-boost-tighter-match
    severity: P1
    effort: S
    title: "Contracts boost matches only the exact endpoint path, not arbitrary POSTs"
    outcome: "On eShopOnWeb, `pack --mode implement --query 'create order'` promotes files that consume `POST /api/orders`, NOT files that POST to other endpoints"
    threshold: "top-5 contains the catalog-orders client file; does NOT contain unrelated POST consumers"
    negative_case: "when no endpoint matches, boost does not fire (not applied as +0.10 to every item)"
    verify:
      cmd: "scripts/smoke-v3.sh check contracts-boost-tighter-match"
      expected_stdout_contains: "PASS contracts-boost-tighter-match"

  - id: benchmark-develop-ci
    severity: P1
    effort: S
    title: "CI runs benchmark harness on every push to develop"
    outcome: "`.github/workflows/ci.yml` triggers on push to develop"
    threshold: "workflow file contains `branches: [main, develop]` (or equivalent)"
    negative_case: "push to feature/* does not trigger heavy benchmark jobs"
    verify:
      cmd: "grep -E 'develop' .github/workflows/ci.yml"
      expected_stdout_contains: "develop"

  - id: benchmark-ci-emits-ci95
    severity: P1
    effort: S
    title: "Benchmark harness emits 95% confidence intervals"
    outcome: "`context-router benchmark run --json` output includes a `ci95` field for every metric"
    threshold: "jq '.metrics[0].ci95' on output is a non-null number pair"
    negative_case: "n<10 runs → ci95 is null with a warning in stderr"
    verify:
      cmd: "uv run context-router benchmark run --json --runs 10 | jq '.metrics[0].ci95 != null'"
      expected_stdout_contains: "true"

  # ──────────────────── P2 — polish ────────────────────

  - id: call-chain-symbols-mcp
    severity: P2
    effort: M
    title: "get_call_chain_symbols exposed via CLI and MCP"
