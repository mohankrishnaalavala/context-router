    verify:
      cmd: "scripts/smoke-v3.sh check hub-bridge-ranking-signals"
      expected_stdout_contains: "PASS hub-bridge-ranking-signals"

  - id: proactive-embedding-cache
    severity: P2
    effort: M
    title: "Embeddings pre-computed out of pack hot path"
    outcome: "`context-router embed` computes & stores embeddings; subsequent `pack --with-semantic` runs do not download or compute them"
