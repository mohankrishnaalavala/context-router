# docs/release/v4-outcomes.yaml — v4.0 feature outcome registry.
outcomes:
  - id: v4.0-evaluation-harness
    phase: v4.0
    priority: P0
    dod:
      outcome: >-
        `context-router eval --help` prints the subcommand help and
        `context-router eval --queries <path> --json` emits a JSON report.
      threshold: >-
        Report JSON has keys recall_at_k, k, n_queries, mean_pack_tokens,
        token_efficiency, per_query.
      negative_case: >-
        `context-router eval --queries /nonexistent.jsonl` exits non-zero with
        a stderr message naming the missing file.
      verify:
        cmd: context-router eval --help
        expected_stdout_contains: "Recall@K"

  - id: v4.0-workspace-db-sync
    phase: v4.0
    priority: P0
    dod:
      outcome: >-
        `context-router workspace sync` writes cross-repo edges into
        .context-router/workspace.db scoped per src_repo.
      threshold: >-
        Running `workspace sync` on the synthetic fixture completes without
        error and prints a TOTAL line to stdout.
      negative_case: >-
        Running `workspace sync` without a workspace.yaml prints a warning to
        stderr (via _load_or_die) and exits non-zero.
      verify:
        cmd: >-
          context-router workspace sync
            --project-root tests/fixtures/workspaces/synthetic
        expected_stdout_contains: "TOTAL:"

  - id: v4.0-synthetic-recall-gate
    phase: v4.0
    priority: P0
    dod:
      outcome: >-
        CI runs scripts/eval-synthetic.sh on every PR and fails if
        Recall@20 < 0.65 on the synthetic fixture.
      threshold: >-
        scripts/eval-synthetic.sh exits 0 with "PASS synthetic-recall-gate"
        on the current codebase.
      negative_case: >-
        If the fixture is missing, the script exits non-zero with
        "FAIL synthetic-recall-gate: fixture not found".
      verify:
        cmd: bash scripts/eval-synthetic.sh
        expected_stdout_contains: "PASS synthetic-recall-gate"

  - id: v4.0-workspace-orchestrator
    phase: v4.0
    priority: P0
    dod:
      outcome: >-
        `WorkspaceOrchestrator(workspace_root=path).cross_repo_edges_for_repo(repo_id)`
        reads edges from workspace.db without recomputing them.
      threshold: >-
        TestWorkspaceDbBackedBoost.test_reads_edges_from_workspace_db passes.
      negative_case: >-
        When workspace.db does not exist, `cross_repo_edges_for_repo` returns
        an empty list (no error).
      verify:
        cmd: >-
          uv run pytest packages/core/tests/test_workspace_orchestrator.py::TestWorkspaceDbBackedBoost
        expected_stdout_contains: "passed"

  - id: v4.1-save-observation-file
    phase: v4.1
    priority: P0
    description: >-
      save_observation writes a git-tracked .md file under
      .context-router/memory/observations/ with YAML frontmatter.
    dod:
      outcome: >-
        After save_observation, a .md file exists whose frontmatter
        lists files_touched. Write gate rejects obs with no files_touched.
      threshold: >-
        .context-router/memory/observations/*.md exists after a valid
        save_observation call.
      negative_case: >-
        save_observation with no files_touched does not write a .md file.
      verify:
        cmd: bash scripts/smoke-v4.1.sh
        expected_stdout_contains: "PASS: 4/4"

  - id: v4.1-pack-use-memory
    phase: v4.1
    priority: P0
    description: >-
      pack --use-memory includes top-8 ranked observations in JSON output.
    dod:
      outcome: >-
        pack --use-memory --json output contains memory_hits key with
        at least 0 items (no crash when memory is empty).
      threshold: >-
        "memory_hits": appears in pack --use-memory --json output.
      negative_case: >-
        pack without --use-memory does not include memory_hits key.
      verify:
        cmd: bash scripts/smoke-v4.1.sh
        expected_stdout_contains: "PASS: 4/4"

  - id: v4.1-migrate-sqlite
    phase: v4.1
    priority: P1
    description: >-
      memory migrate-from-sqlite writes one .md file per valid SQLite row.
    dod:
      outcome: >-
        migrate-from-sqlite reads all SQLite observations and writes .md
        files for those passing the write gate.
      threshold: >-
        Exit code 0 and JSON output includes migrated count.
      negative_case: >-
        Short-summary observations are skipped (write gate enforced).
      verify:
        cmd: bash scripts/smoke-v4.1.sh
        expected_stdout_contains: "PASS: 4/4"

  - id: v4.2-memory-promotion
    phase: v4.2
    priority: P0
    description: >-
      Committed memory files surface in teammate packs; staged/branch-local
      observations are visible only on the authoring branch.
    dod:
      outcome: >-
        On a clean checkout of main, pack --use-memory only surfaces
        observations committed to main. Staged-only observations written on
        a feature branch do not appear in a main-branch pack.
      threshold: >-
        (a) After git commit of an observation file, pack --use-memory on
        main includes at least that one hit. (b) A staged-but-uncommitted
        observation does not appear in pack output built from a fresh main
        checkout. (c) memory_hits_summary key present in --json output with
        committed and staged integer values.
      negative_case: >-
        If git is unavailable or the observations directory is not inside a
        git repo, all hits are treated as committed (no crash, no empty pack).
      verify:
        cmd: >-
          context-router pack --use-memory --json --query "…"
          | jq '.memory_hits_summary'
        expected_stdout_contains: "committed"

  - id: v4.2-memory-sub-budget
    phase: v4.2
    priority: P0
    description: >-
      Memory token consumption is capped at 15% of the total pack budget.
      Configurable via memory_budget_pct in .context-router/config.yaml.
    dod:
      outcome: >-
        Memory items in a pack never exceed int(total_budget * 0.15) tokens.
        Code items fill the remaining 85%.
      threshold: >-
        pack_tokens_memory / pack_tokens_total <= 0.15 on every
        release-fixture query. budget.memory_ratio in --json output is a
        float in [0.0, 0.15].
      negative_case: >-
        If memory_budget_pct is set <= 0 or >= 1 in config.yaml,
        context-router emits "warning: memory_budget_pct out of range,
        using 0.15" to stderr and falls back to the default.
      verify:
        cmd: >-
          context-router pack --use-memory --json --query "…"
          | jq '.budget.memory_ratio'
        expected_stdout_contains: "0."

  - id: v4.2-adaptive-top-k
    phase: v4.2
    priority: P1
    description: >-
      Trailing items whose confidence is below 60% of the leader's confidence
      are dropped in review and implement modes. Debug and handover modes
      return all items for completeness.
    dod:
      outcome: >-
        In review/implement modes, the returned item list never includes
        trailing items with confidence < 0.6 * items[0].confidence.
        In debug/handover modes, all budget-admitted items are returned
        regardless of relative confidence.
      threshold: >-
        On the judge benchmark single-file ground-truth fixture, F1 >= 0.45
        in review mode (up from 0.270 baseline). The synthetic Recall@20 gate
        (scripts/eval-synthetic.sh) continues to pass.
      negative_case: >-
        When all items have similar confidence (max spread < 40%), no items
        are dropped (floor never fires). When only one item remains, it is
        always returned regardless of confidence.
      verify:
        cmd: >-
          uv run pytest packages/ranking/tests/test_ranker.py
          -k "adaptive_topk" -v
        expected_stdout_contains: "passed"

  # ---------------------------------------------------------------------------
  # v4.3 outcomes
  # ---------------------------------------------------------------------------

  - id: v4.3-adaptive-topk-gradient
    phase: v4.3
    priority: P0
    description: >-
      Plateau-based second cut in adaptive top-k. When consecutive items have
      confidence within PLATEAU_DELTA (0.02) of each other AND all are below
      ABS_FLOOR (0.45), trailing plateau items are dropped.
    dod:
      outcome: >-
        Adaptive top-k fires on tight-cluster tasks that Rule 1 (0.6× floor)
        previously missed. On the 12-task benchmark, adaptive top-k fires on
        >= 6 tasks (up from 3). Avg F1 >= 0.450. Avg tokens <= 2,100.
      threshold: >-
        test_adaptive_topk_plateau_rule_fires passes: items [0.52, 0.44, 0.43, 0.42, 0.41]
        with ABS_FLOOR=0.45 → only first two kept.
        test_adaptive_topk_plateau_rule_noop_above_abs_floor passes: items all >= ABS_FLOOR
        → no cut.
      negative_case: >-
        When items span a wide range (leader 0.80, trailer 0.45), Rule 1 fires
        instead of Rule 2. No double-cut. Items above ABS_FLOOR are never dropped
        by the plateau rule.
      verify:
        cmd: uv run pytest packages/ranking/tests/test_ranker.py -k "plateau" -v
        expected_stdout_contains: "passed"

  - id: v4.3-fastapi-t1-recovery
    phase: v4.3
    priority: P1
    description: >-
      Extend _AUX_PATH_RE to cover docs_src/, examples/, fixtures/, stubs/, mocks/
      paths so tutorial files receive the 0.85x auxiliary-file penalty.
    dod:
      outcome: >-
        fastapi T1 (oauth2 docstring): GT file (fastapi/security/oauth2.py) appears
        in top-5. docs_src/security/tutorial003*.py ranks below oauth2.py.
      threshold: >-
        _is_test_or_script_path('docs_src/security/tutorial003_py310.py') returns True.
        _is_test_or_script_path('examples/auth.py') returns True.
        _is_test_or_script_path('src/main.py') returns False.
      negative_case: >-
        Canonical source files (fastapi/security/oauth2.py, src/core/ranker.py) are
        NOT matched by _AUX_PATH_RE and receive no penalty.
      verify:
        cmd: uv run pytest packages/ranking/tests/test_ranker.py -k "aux_path_re" -v
        expected_stdout_contains: "passed"

  - id: v4.3-stale-detection
    phase: v4.3
    priority: P0
    description: >-
      Git-based staleness detection for memory observations. Observations whose
      files_touched paths are absent from HEAD are flagged as stale. CLI commands
      surface severity and allow pruning.
    dod:
      outcome: >-
        `memory stale` lists observations whose files_touched paths are absent from
        HEAD. Stale hits in pack output carry "stale": true and emit a stderr warning.
        `memory prune --stale` removes them and prints a count.
      threshold: >-
        On a fixture where one observation points at a deleted file:
        (a) `memory stale` lists that observation with severity missing_file.
        (b) `pack --use-memory --json` includes "stale": true on that hit.
        (c) `memory prune --stale` removes it; subsequent `memory stale` returns empty.
      negative_case: >-
        When git is unavailable, `memory stale` exits non-zero with
        "git is required for staleness detection" on stderr. Pack still builds.
      verify:
        cmd: bash scripts/smoke-v4.3.sh
        expected_stdout_contains: "PASS: stale-detection"

  - id: v4.3-memory-federation
    phase: v4.3
    priority: P0
    description: >-
      Cross-repo memory federation via workspace.yaml. search_memory --workspace
      queries memory from all workspace repos. Federated hits carry source_repo labels.
    dod:
      outcome: >-
        search_memory --workspace returns hits from all workspace repos labeled with
        source_repo. pack --use-memory --workspace injects federated hits.
        memory_hits_summary includes a "federated" count.
      threshold: >-
        On the synthetic workspace fixture with observations in both backend and
        frontend repos (committed):
        (a) search_memory --workspace --query "checkout" returns at least one hit
            from each repo.
        (b) pack --use-memory --json shows memory_hits_summary.federated > 0.
        (c) Staged-only observations from sibling repos do NOT appear in results.
      negative_case: >-
        When --workspace is passed without a workspace.yaml,
        "WARN: --workspace has no effect; no workspace.yaml found" is emitted to
        stderr and the command proceeds in single-repo mode.
      verify:
        cmd: bash scripts/smoke-v4.3.sh
        expected_stdout_contains: "PASS: memory-federation"

  # ── v4.4 outcomes ──────────────────────────────────────────────────────────

  - id: v4.4-symbol-body-enrichment
    phase: v4.4
    priority: P0
    description: >-
      ContextItems in agent format include inline symbol bodies so agents read
      ~200 tokens instead of opening full files (~10,000 tokens).
    dod:
      outcome: >-
        `context-router pack --format agent` returns items with a "body" key
        containing the actual source code for each symbol. Agents no longer
        need to read entire files to get symbol content.
      threshold: >-
        For any pack with at least one indexed symbol, to_agent_format() returns
        a "body" key on items where the symbol was found in the DB and the file
        is readable. Items without a DB match omit "body" silently.
      negative_case: >-
        When a symbol is not in the index (e.g. after a fresh clone before
        `context-router index`), the item is returned without "body" and no
        warning is emitted — agents fall back to reading the full file.
      verify:
        cmd: >-
          context-router pack --mode implement --query "oauth2 password" --format agent --json
        expected_stdout_contains: '"body"'

  - id: v4.4-source-file-boost
    phase: v4.4
    priority: P0
    description: >-
      Source files whose basename matches a query token are boosted 1.3x over
      test files that only mention the module name in excerpts.
    dod:
      outcome: >-
        For the query "Fix typo for client_secret in OAuth2 form docstrings",
        fastapi/security/oauth2.py ranks at position 1 in the pack (was missing
        from top-5 in v4.3).
      threshold: >-
        `context-router pack --mode debug --query "oauth2 form docstrings"` against
        a fastapi checkout returns oauth2.py as the first item in selected_items.
      negative_case: >-
        The boost only fires for non-test, non-script source files. Test files
        (matching _is_test_or_script_path) are never boosted, regardless of
        filename match.
      verify:
        cmd: >-
          context-router pack --mode debug --query "oauth2 form docstrings" --json
            | python3 -c "import json,sys; d=json.load(sys.stdin); print(d['selected_items'][0]['path_or_ref'])"
        expected_stdout_contains: "oauth2"

  - id: v4.4-language-analyzers
    phase: v4.4
    priority: P1
    description: >-
      Six new language analyzers (Go, Rust, Ruby, PHP, SQL, JavaScript) produce
      symbols for indexing, making context-router effective on polyglot repos.
    dod:
      outcome: >-
        `context-router index` on a repo containing .go, .rs, .rb, .php, .sql,
        and .js files produces symbols for each language. Pack results for those
        repos include file-level context items.
      threshold: >-
        Each language analyzer package has ≥4 passing unit tests covering
        function/method/class/struct detection and test-file detection.
      negative_case: >-
        Files with unsupported extensions are silently skipped (no warning, no
        crash). The overall index run still succeeds.
      verify:
        cmd: >-
          uv run pytest packages/language-go packages/language-rust packages/language-ruby
            packages/language-php packages/language-sql packages/language-typescript -q
        expected_stdout_contains: "passed"

  - id: v4.4-semantic-rerank-default
    phase: v4.4
    priority: P1
    description: >-
      Semantic re-ranking (all-MiniLM-L6-v2) is enabled by default. ABS_FLOOR
      lowered from 0.45 to 0.40 to recover borderline-confidence items.
    dod:
      outcome: >-
        ContextRanker uses semantic similarity boosting without any opt-in flag.
        When sentence-transformers is unavailable, a stderr warning is emitted
        and ranking proceeds without semantic boost (no silent no-op).
      threshold: >-
        `python3 -c "from ranking.ranker import ContextRanker, _ADAPTIVE_TOPK_ABS_FLOOR;
        r = ContextRanker(); assert r._use_embeddings; assert _ADAPTIVE_TOPK_ABS_FLOOR == 0.40"`
        exits 0.
      negative_case: >-
        When sentence-transformers is not installed, stderr contains
        "semantic model is unavailable" and the pack is still returned with all
        other signals applied.
      verify:
        cmd: >-
          python3 -c "from ranking.ranker import ContextRanker, _ADAPTIVE_TOPK_ABS_FLOOR;
          r = ContextRanker(token_budget=0); assert r._use_embeddings is True;
          assert _ADAPTIVE_TOPK_ABS_FLOOR == 0.40; print('PASS: semantic-rerank-default')"
        expected_stdout_contains: "PASS: semantic-rerank-default"
