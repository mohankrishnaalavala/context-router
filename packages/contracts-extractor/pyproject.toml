[project]
name = "context-router-contracts-extractor"
version = "2.0.0"
requires-python = ">=3.12"
description = "Cross-language service contract extraction (OpenAPI / protobuf / GraphQL) for context-router"
dependencies = [
    "context-router-contracts",
    "pyyaml>=6.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/contracts_extractor"]
