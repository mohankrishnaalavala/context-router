openapi: 3.0.3
info:
  title: Sample API
  version: "1.0.0"
paths:
  /users/{id}:
    get:
      operationId: getUserById
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
    delete:
      operationId: deleteUser
      responses:
        "204":
          description: No Content
  /users:
    post:
      operationId: createUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/User"
      responses:
        "201":
          description: Created
components:
  schemas:
    User:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
