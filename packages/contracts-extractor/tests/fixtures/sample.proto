syntax = "proto3";

package sample;

// A request to greet someone.
message HelloRequest {
  string name = 1;
}

message HelloReply {
  string message = 1;
}

message ByeRequest {
  string name = 1;
}

message ByeReply {
  string message = 1;
}

service Greeter {
  // Unary RPC
  rpc SayHello (HelloRequest) returns (HelloReply);
  // Server-streaming
  rpc SayGoodbye (ByeRequest) returns (stream ByeReply);
}
