[project]
name = "context-router-contracts"
version = "0.3.0"
requires-python = ">=3.12"
description = "Shared Pydantic contracts and plugin interfaces for context-router"
dependencies = [
    "pydantic>=2.0",
    "pyyaml>=6.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/contracts"]
