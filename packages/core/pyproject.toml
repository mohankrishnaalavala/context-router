[project]
name = "context-router-core"
version = "0.4.0"
requires-python = ">=3.12"
description = "Orchestration, plugin loader, and use-case coordinators for context-router"
dependencies = [
    "context-router-contracts",
    "context-router-storage-sqlite",
    "context-router-graph-index",
    "context-router-ranking",
    "context-router-runtime",
    "context-router-memory",
    "context-router-workspace",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/core"]
