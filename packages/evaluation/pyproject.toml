[project]
name = "context-router-evaluation"
version = "4.0.0"
requires-python = ">=3.12"
description = "Recall@K and token-efficiency evaluation harness for context-router packs"
dependencies = [
    "pydantic>=2.0",
    "context-router-contracts",
    "context-router-core",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/evaluation"]
