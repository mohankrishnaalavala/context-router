[project]
name = "context-router-graph-index"
version = "3.3.0"
requires-python = ">=3.12"
description = "File scanner and structural symbol graph for context-router (Phase 1)"
dependencies = [
    "context-router-contracts",
    "context-router-storage-sqlite",
    "watchdog>=4.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/graph_index"]
