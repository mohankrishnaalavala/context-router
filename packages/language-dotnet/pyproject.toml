[project]
name = "context-router-language-dotnet"
version = "0.1.0"
requires-python = ">=3.12"
description = "C#/.NET language analyzer plugin for context-router (Phase 1)"
dependencies = ["context-router-contracts"]

[project.entry-points."context_router.language_analyzers"]
cs = "language_dotnet:DotnetAnalyzer"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/language_dotnet"]
