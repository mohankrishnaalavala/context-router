[project]
name = "context-router-language-dotnet"
version = "4.4.3"
requires-python = ">=3.12"
description = "C#/.NET language analyzer plugin for context-router (Phase 1)"
license = {text = "Apache-2.0"}
dependencies = [
    "context-router-contracts",
    "tree-sitter>=0.21",
    "tree-sitter-c-sharp>=0.21",
]

[project.entry-points."context_router.language_analyzers"]
cs = "language_dotnet:DotnetAnalyzer"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/language_dotnet"]
