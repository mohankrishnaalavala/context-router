[project]
name = "context-router-language-go"
version = "4.4.2"
requires-python = ">=3.12"
description = "Go language analyzer plugin for context-router"
license = {text = "Apache-2.0"}
dependencies = [
    "context-router-contracts",
    "tree-sitter>=0.21",
    "tree-sitter-go>=0.21",
]

[project.entry-points."context_router.language_analyzers"]
go = "language_go:GoAnalyzer"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/language_go"]
