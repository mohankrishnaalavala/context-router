[project]
name = "context-router-language-java"
version = "0.1.0"
requires-python = ">=3.12"
description = "Java language analyzer plugin for context-router (Phase 1)"
dependencies = ["context-router-contracts"]

[project.entry-points."context_router.language_analyzers"]
java = "language_java:JavaAnalyzer"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/language_java"]
