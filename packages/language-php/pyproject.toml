[project]
name = "context-router-language-php"
version = "4.4.4"
requires-python = ">=3.12"
description = "PHP language analyzer plugin for context-router"
license = {text = "Apache-2.0"}
dependencies = [
    "context-router-contracts",
    "tree-sitter>=0.21",
    "tree-sitter-php>=0.21",
]

[project.entry-points."context_router.language_analyzers"]
php = "language_php:PhpAnalyzer"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/language_php"]
