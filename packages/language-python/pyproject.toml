[project]
name = "context-router-language-python"
version = "4.4.0"
requires-python = ">=3.12"
description = "Python language analyzer plugin for context-router (Phase 1)"
license = {text = "Apache-2.0"}
dependencies = [
    "context-router-contracts",
    "tree-sitter>=0.21",
    "tree-sitter-python>=0.21",
]

[project.entry-points."context_router.language_analyzers"]
py = "language_python:PythonAnalyzer"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/language_python"]
