[project]
name = "context-router-language-ruby"
version = "4.4.3"
requires-python = ">=3.12"
description = "Ruby language analyzer plugin for context-router"
license = {text = "Apache-2.0"}
dependencies = [
    "context-router-contracts",
    "tree-sitter>=0.21",
    "tree-sitter-ruby>=0.21",
]

[project.entry-points."context_router.language_analyzers"]
rb = "language_ruby:RubyAnalyzer"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/language_ruby"]
