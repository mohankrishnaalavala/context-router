[project]
name = "context-router-language-sql"
version = "4.4.4"
requires-python = ">=3.12"
description = "SQL language analyzer plugin for context-router"
license = {text = "Apache-2.0"}
dependencies = [
    "context-router-contracts",
]

[project.entry-points."context_router.language_analyzers"]
sql = "language_sql:SqlAnalyzer"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/language_sql"]
