[project]
name = "context-router-language-yaml"
version = "4.4.1"
requires-python = ">=3.12"
description = "YAML language analyzer plugin for context-router (Phase 1)"
license = {text = "Apache-2.0"}
dependencies = [
    "context-router-contracts",
    "pyyaml>=6.0",
]

[project.entry-points."context_router.language_analyzers"]
yaml = "language_yaml:YamlAnalyzer"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/language_yaml"]
