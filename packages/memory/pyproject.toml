[project]
name = "context-router-memory"
version = "0.6.0"
requires-python = ">=3.12"
description = "Observations and decisions memory store for context-router (Phase 4)"
dependencies = ["context-router-contracts", "context-router-storage-sqlite"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/memory"]
