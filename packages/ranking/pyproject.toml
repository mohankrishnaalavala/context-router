[project]
name = "context-router-ranking"
version = "0.3.0"
requires-python = ">=3.12"
description = "Mode-specific context rankers and token budget enforcer for context-router (Phase 2)"
dependencies = ["context-router-contracts"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/ranking"]
