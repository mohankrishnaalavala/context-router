[project]
name = "context-router-runtime"
version = "3.3.1"
requires-python = ">=3.12"
description = "Stack trace, test failure, and log parsers for context-router (Phase 3)"
dependencies = ["context-router-contracts"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/runtime"]
