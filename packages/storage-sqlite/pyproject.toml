[project]
name = "context-router-storage-sqlite"
version = "0.7.0"
requires-python = ">=3.12"
description = "SQLite + FTS5 storage backend with repository pattern for context-router"
dependencies = [
    "context-router-contracts",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/storage_sqlite"]
