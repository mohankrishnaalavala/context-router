[project]
name = "context-router-workspace"
version = "0.5.0"
requires-python = ">=3.12"
description = "Multi-repo workspace registry and cross-repo link model for context-router (Phase 7)"
dependencies = ["context-router-contracts"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/workspace"]
